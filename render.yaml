services:
  - type: web
    name: banking-api
    env: python
    region: frankfurt
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: APP_NAME
        value: Banking API
      - key: DEBUG
        value: false
      - key: API_PREFIX
        value: /api/v1
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 8000
      - key: DB_POOL_SIZE
        value: 10
      - key: DB_MAX_OVERFLOW
        value: 20
      - key: DB_POOL_TIMEOUT
        value: 30
      - key: DB_POOL_RECYCLE
        value: 1800
      - key: REDIS_DB
        value: 0
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 7
      - key: ALGORITHM
        value: HS256
      - key: RATE_LIMIT_REQUESTS
        value: 100
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: 60
      - key: ALLOW_CREDENTIALS
        value: true
    disk:
      name: migrations
      mountPath: /app/alembic/versions
      sizeGB: 1
